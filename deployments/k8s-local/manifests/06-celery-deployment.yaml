apiVersion: apps/v1
kind: Deployment
metadata:
  name: bgc-data-portal-celery
  namespace: bgc-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bgc-data-portal-celery
  template:
    metadata:
      labels:
        app: bgc-data-portal-celery
    spec:
      containers:
        - name: celery
          image: bgc-data-portal-django-worker
          workingDir: /app
          # watchmedo restarts Celery automatically when Skaffold syncs .py files
          # --concurrency=1 mirrors dev/prod: one phmmer DB resident per worker.
          command:
            - watchmedo
            - auto-restart
            - --directory=/app
            - --pattern=*.py
            - --recursive
            - --
            - celery
            - -A
            - bgc_data_portal.celery
            - worker
            - --loglevel=info
            - --concurrency=1
          env:
            - name: PROTEIN_SEARCH_INDEX_DIR
              value: /data/protein_search
            - name: CLUSTERING_ARTIFACTS_DIR
              value: /data/clustering_artifacts
          envFrom:
            - secretRef:
                name: bgc-data-portal-secret
            - configMapRef:
                name: app-config
          volumeMounts:
            - name: packages
              mountPath: /data/packages
            - name: protein-search-index
              mountPath: /data/protein_search
            - name: clustering-artifacts
              mountPath: /data/clustering_artifacts
      volumes:
        - name: packages
          emptyDir: {}
        # Local-only: emptyDir survives pod restarts but not pod recreation.
        # Rebuild via `make build-protein-index` after a fresh deploy.
        - name: protein-search-index
          emptyDir: {}
        # Shared with the Django pod so the scoring cache the pipeline writes
        # here is visible to the API handlers in the web pod.
        - name: clustering-artifacts
          persistentVolumeClaim:
            claimName: clustering-artifacts
