apiVersion: apps/v1
kind: Deployment
metadata:
  name: bgc-data-portal-django
  namespace: bgc-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bgc-data-portal-django
  template:
    metadata:
      labels:
        app: bgc-data-portal-django
    spec:
      # Run migrations before the main container starts.
      # Prevents the Celery worker from hitting an unmigrated DB on first boot.
      initContainers:
        - name: wait-for-postgres
          image: bgc-data-portal-django
          command:
            - sh
            - -c
            - |
              until python -c "import socket; socket.create_connection(('postgres', 5432))" 2>/dev/null; do
                echo "waiting for postgres..."; sleep 2
              done
        - name: migrate
          image: bgc-data-portal-django  # Skaffold replaces with the built tag
          workingDir: /app
          command: [python, manage.py, migrate, --noinput]
          envFrom:
            - secretRef:
                name: bgc-data-portal-secret
            - configMapRef:
                name: app-config
      containers:
        - name: django
          image: bgc-data-portal-django  # Skaffold replaces with the built tag
          workingDir: /app
          # runserver auto-reloads on .py changes synced by Skaffold
          command:
            - python
            - manage.py
            - runserver
            - 0.0.0.0:8000
          env:
            - name: CLUSTERING_ARTIFACTS_DIR
              value: /data/clustering_artifacts
          envFrom:
            - secretRef:
                name: bgc-data-portal-secret
            - configMapRef:
                name: app-config
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: packages
              mountPath: /data/packages
            - name: clustering-artifacts
              mountPath: /data/clustering_artifacts
      volumes:
        # emptyDir avoids PVC multi-writer complexity for local dev.
        # Data does not survive pod restarts — acceptable in local dev.
        - name: packages
          emptyDir: {}
        # Shared with the celery worker so the worker-written scoring cache
        # is visible to the Django pod (single-node Kind, RWO is enough).
        - name: clustering-artifacts
          persistentVolumeClaim:
            claimName: clustering-artifacts
