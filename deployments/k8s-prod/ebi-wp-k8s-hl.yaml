apiVersion: v1
kind: List
items:
 ###############################################################################
 # 0. Namespace + proxy configuration (unchanged)
 ###############################################################################
  # - apiVersion: v1
  #   kind: Namespace
  #   metadata:
  #     name: bgc-data-portal-hl-prod

  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: proxy-config
      namespace: bgc-data-portal-hl-prod
    data:
      HTTP_PROXY:  "http://hh-wwwcache.ebi.ac.uk:3128"
      HTTPS_PROXY: "http://hh-wwwcache.ebi.ac.uk:3128"
      http_proxy:  "http://hh-wwwcache.ebi.ac.uk:3128"
      https_proxy: "http://hh-wwwcache.ebi.ac.uk:3128"
      no_proxy:    "localhost,.cluster.local"
      ALLOWED_HOSTS: ".ebi.ac.uk,ebi.ac.uk,www.ebi.ac.uk"
      CSRF_TRUSTED_ORIGINS: "https://www.ebi.ac.uk,https://ebi.ac.uk"
      CORS_ALLOWED_ORIGINS: "https://www.ebi.ac.uk,https://ebi.ac.uk"
      MATOMO_URL:  "https://ebi-mgnify.matomo.cloud/"
      MATOMO_SITE_ID: "6"


 ###############################################################################
 # 1. PostgreSQL (pgvector)  — 35 GiB
 ###############################################################################
  - apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: postgres
      namespace: bgc-data-portal-hl-prod
      labels:
        app: postgres
    spec:
      serviceName: postgres
      replicas: 1
      selector:
        matchLabels:
          app: postgres
      template:
        metadata:
          labels:
            app: postgres
        spec:
          imagePullSecrets:
            - name: quay-pull-secret
          # Provide a larger shared memory (/dev/shm) for PostgreSQL to avoid
          # "could not resize shared memory segment ... No space left on device"
          # errors during heavy queries (hash/sort/parallel ops).
          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 1Gi
          containers:
            - name: postgres
              image: quay.io/microbiome-informatics/pgvector:latest
              imagePullPolicy: Always
              env:
                - name: PGDATA
                  value: /var/lib/postgresql/data/pgdata
              envFrom:
                - secretRef:
                    name: bgc-data-portal-secret
                - configMapRef:
                    name: proxy-config
              ports:
                - containerPort: 5432
              readinessProbe:
                exec:
                  command:
                    - sh
                    - -c
                    - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
                initialDelaySeconds: 5
                periodSeconds: 5
              livenessProbe:
                exec:
                  command:
                    - sh
                    - -c
                    - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
                initialDelaySeconds: 10
                periodSeconds: 10
              volumeMounts:
                - name: db-data
                  mountPath: /var/lib/postgresql
                # Mount the tmpfs volume to /dev/shm so PostgreSQL can allocate
                # sufficient POSIX shared memory for operations.
                - name: dshm
                  mountPath: /dev/shm
      volumeClaimTemplates:
        - metadata:
            name: db-data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 35Gi

  - apiVersion: v1
    kind: Service
    metadata:
      name: postgres
      namespace: bgc-data-portal-hl-prod
    spec:
      clusterIP: None
      selector:
        app: postgres
      ports:
        - port: 5432
          targetPort: 5432

 ###############################################################################
 # 2. Redis
 ###############################################################################
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: redis
      namespace: bgc-data-portal-hl-prod
      labels:
        app: redis
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: redis
      template:
        metadata:
          labels:
            app: redis
        spec:
          imagePullSecrets:
            - name: quay-pull-secret
          containers:
            - name: redis
              image: quay.io/microbiome-informatics/redis:7.4
              imagePullPolicy: Always
              ports:
                - containerPort: 6379
              readinessProbe:
                exec:
                  command:
                    - redis-cli
                    - ping
                periodSeconds: 5
                timeoutSeconds: 3
              livenessProbe:
                exec:
                  command:
                    - redis-cli
                    - ping
                periodSeconds: 5
                timeoutSeconds: 3

  - apiVersion: v1
    kind: Service
    metadata:
      name: redis
      namespace: bgc-data-portal-hl-prod
    spec:
      selector:
        app: redis
      ports:
        - port: 6379
          targetPort: 6379

 ###############################################################################
 # 3. RabbitMQ
 ###############################################################################
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: rabbitmq
      namespace: bgc-data-portal-hl-prod
      labels:
        app: rabbitmq
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: rabbitmq
      template:
        metadata:
          labels:
            app: rabbitmq
        spec:
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            runAsNonRoot: true
          imagePullSecrets:
            - name: quay-pull-secret
          containers:
            - name: rabbitmq
              image: quay.io/microbiome-informatics/rabbitmq:amd64
              imagePullPolicy: Always
              envFrom:
                - secretRef:
                    name: bgc-data-portal-secret
                - configMapRef:
                    name: proxy-config
              ports:
                - name: amqp
                  containerPort: 5672
                - name: management
                  containerPort: 15672
              readinessProbe:
                exec:
                  command:
                    - rabbitmq-diagnostics
                    - -q
                    - ping
                periodSeconds: 5
              livenessProbe:
                exec:
                  command:
                    - rabbitmq-diagnostics
                    - -q
                    - ping
                periodSeconds: 5

  - apiVersion: v1
    kind: Service
    metadata:
      name: rabbitmq
      namespace: bgc-data-portal-hl-prod
    spec:
      selector:
        app: rabbitmq
      ports:
        - name: amqp
          port: 5672
          targetPort: 5672
        - name: management
          port: 15672
          targetPort: 15672

 ###############################################################################
 # 4. Django web app
 ###############################################################################
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: bgc-data-portal-django
      namespace: bgc-data-portal-hl-prod
      labels:
        app: bgc-data-portal-django
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: bgc-data-portal-django
      template:
        metadata:
          labels:
            app: bgc-data-portal-django
        spec:
          securityContext:
            runAsUser: 7123
            runAsGroup: 1347
            fsGroup: 1347
          imagePullSecrets:
            - name: quay-pull-secret
          volumes:
            - name: static-volume
              persistentVolumeClaim:
                claimName: bgc-static-volume-claim
            - name: ingest-packages
              persistentVolumeClaim:
                claimName: bgc-ingest-packages-claim
            - name: hf-cache
              persistentVolumeClaim:
                claimName: bgc-hf-cache-claim
          initContainers:
            - name: wait-for-postgres
              image: quay.io/microbiome-informatics/bgc_dp_web_site:latest
              command:
                - sh
                - -c
                - |
                  until python -c "import socket; socket.create_connection(('postgres', 5432), timeout=2)" 2>/dev/null; do
                    echo "waiting for postgres..."; sleep 2
                  done
          containers:
            - name: django
              image: quay.io/microbiome-informatics/bgc_dp_web_site:latest
              workingDir: /app
              imagePullPolicy: Always
              env:
                - name: DJANGO_FORCE_SCRIPT_NAME
                  value: /finn-srv/mgnify-bgcs
                - name: MEDIA_ROOT
                  value: /data/packages
                - name: HF_HOME
                  value: /data/huggingface
                - name: NUMBA_CACHE_DIR
                  value: /tmp/numba_cache
              envFrom:
                - secretRef:
                    name: bgc-data-portal-secret
                - configMapRef:
                    name: proxy-config
              ports:
                - name: http
                  containerPort: 8000
              command:
                - /bin/sh
                - -c
                - |
                  cd /app && \
                  python manage.py migrate && \
                  gunicorn bgc_data_portal.wsgi:application -b 0.0.0.0:8000 --workers 3
              volumeMounts:
                - mountPath: /app/staticfiles
                  name: static-volume
                - mountPath: /data/packages
                  name: ingest-packages
                - mountPath: /data/huggingface
                  name: hf-cache

  - apiVersion: v1
    kind: Service
    metadata:
      name: bgc-data-portal-django
      namespace: bgc-data-portal-hl-prod
      labels:
        app: bgc-data-portal-django
    spec:
      type: ClusterIP
      selector:
        app: bgc-data-portal-django
      ports:
        - name: http
          port: 80
          targetPort: 8000

 ###############################################################################
 # 5. Celery worker
 ###############################################################################
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: bgc-data-portal-celery
      namespace: bgc-data-portal-hl-prod
      labels:
        app: bgc-data-portal-celery
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: bgc-data-portal-celery
      template:
        metadata:
          labels:
            app: bgc-data-portal-celery
        spec:
          securityContext:
            runAsUser: 7123
            runAsGroup: 1347
            fsGroup: 1347
          imagePullSecrets:
            - name: quay-pull-secret
          volumes:
            - name: ingest-packages
              persistentVolumeClaim:
                claimName: bgc-ingest-packages-claim
            - name: hf-cache
              persistentVolumeClaim:
                claimName: bgc-hf-cache-claim
            - name: static-volume
              persistentVolumeClaim:
                claimName: bgc-static-volume-claim
          containers:
            - name: celery
              image: quay.io/microbiome-informatics/bgc_dp_web_site_worker:latest
              imagePullPolicy: Always
              env:
                - name: HF_HOME
                  value: /data/huggingface
                - name: NUMBA_CACHE_DIR
                  value: /tmp/numba_cache
              envFrom:
                - secretRef:
                    name: bgc-data-portal-secret
                - configMapRef:
                    name: proxy-config
              command:
                - /bin/sh
                - -c
                - |
                  sleep 15 && \
                  celery -A bgc_data_portal.celery worker --loglevel=info
              volumeMounts:
                - mountPath: /app/staticfiles
                  name: static-volume
                - mountPath: /data/packages
                  name: ingest-packages
                - mountPath: /data/huggingface
                  name: hf-cache


 ###############################################################################
 # 7. Static NGINX (serves /static/* with correct MIME)
 ###############################################################################
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: bgc-data-portal-static
      namespace: bgc-data-portal-hl-prod
      labels:
        app: bgc-data-portal-static
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: bgc-data-portal-static
      template:
        metadata:
          labels:
            app: bgc-data-portal-static
        spec:
          imagePullSecrets:
            - name: quay-pull-secret
          containers:
            - name: nginx
              image: nginx:alpine
              ports:
                - containerPort: 80
              volumeMounts:
                - name: static-volume
                  # mountPath: /usr/share/nginx/html/static
                  mountPath: /usr/share/nginx/html  # Changed from /usr/share/nginx/html/static
                - name: nginx-cache
                  mountPath: /var/cache/nginx

          volumes:
            - name: static-volume
              persistentVolumeClaim:
                claimName: bgc-static-volume-claim
            - name: nginx-cache
              emptyDir: {}

  - apiVersion: v1
    kind: Service
    metadata:
      name: bgc-data-portal-static
      namespace: bgc-data-portal-hl-prod
    spec:
      selector:
        app: bgc-data-portal-static
      ports:
        - name: http
          port: 80
          targetPort: 80

 ###############################################################################
 # 8. Ingress for public host (static,  & large-body)
 ###############################################################################
  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: bgc-data-portal-ingress
      namespace: bgc-data-portal-hl-prod
      annotations:
        kubernetes.io/ingress.class: "nginx"
        nginx.ingress.kubernetes.io/use-regex: "true"
        nginx.ingress.kubernetes.io/proxy-body-size: "6g"
        nginx.ingress.kubernetes.io/rewrite-target: /$2
    spec:
      rules:
        - host: ebi.ac.uk
          http:
            paths:
              - path: /finn-srv/mgnify-bgcs/static(/|$)(.*)
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: bgc-data-portal-static
                    port:
                      number: 80
              - path: /finn-srv/mgnify-bgcs(/|$)(.*)
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: bgc-data-portal-django
                    port:
                      number: 80
        - host: www.ebi.ac.uk
          http:
            paths:
              - path: /finn-srv/mgnify-bgcs/static(/|$)(.*)
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: bgc-data-portal-static
                    port:
                      number: 80
              - path: /finn-srv/mgnify-bgcs(/|$)(.*)
                pathType: ImplementationSpecific
                backend:
                  service:
                    name: bgc-data-portal-django
                    port:
                      number: 80

 ###############################################################################
 # 9. Dynamic PVCs (static assets, ingest packages, HF cache)
 ###############################################################################
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: bgc-static-volume-claim
      namespace: bgc-data-portal-hl-prod
    spec:
      accessModes:
        - ReadWriteMany
      resources:
        requests:
          storage: 2Gi

  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: bgc-ingest-packages-claim
      namespace: bgc-data-portal-hl-prod
    spec:
      accessModes:
        - ReadWriteMany
      resources:
        requests:
          storage: 30Gi

  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: bgc-hf-cache-claim
      namespace: bgc-data-portal-hl-prod
    spec:
      accessModes:
        - ReadWriteMany
      resources:
        requests:
          storage: 10Gi

 ###############################################################################
 # 10. Post-deploy test Jobs
 ###############################################################################
  - apiVersion: batch/v1
    kind: Job
    metadata:
      name: bgc-integration-tests
      namespace: bgc-data-portal-hl-prod
      annotations:
        helm.sh/hook: post-install,post-upgrade
        helm.sh/hook-delete-policy: before-hook-creation
    spec:
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: quay-pull-secret
          containers:
            - name: tests
              image: quay.io/microbiome-informatics/bgc_dp_web_site:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  pip install -r django/requirements-dev.txt && \
                  pytest django/tests/integration/ -v
              envFrom:
                - secretRef:
                    name: bgc-data-portal-secret
                - configMapRef:
                    name: proxy-config

  - apiVersion: batch/v1
    kind: Job
    metadata:
      name: bgc-e2e-tests
      namespace: bgc-data-portal-hl-prod
      annotations:
        helm.sh/hook: post-install,post-upgrade
        helm.sh/hook-delete-policy: before-hook-creation
    spec:
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: quay-pull-secret
          containers:
            - name: tests
              image: quay.io/microbiome-informatics/bgc_dp_web_site:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  pip install -r django/requirements-dev.txt && \
                  playwright install chromium && \
                  pytest django/tests/e2e/ -v --base-url=https://www.ebi.ac.uk/finn-srv/mgnify-bgcs
              envFrom:
                - secretRef:
                    name: bgc-data-portal-secret
                - configMapRef:
                    name: proxy-config
