---
name: Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./k8s-hl/Dockerfile
          load: true
          push: false
          tags: |
            quay.io/microbiome-informatics/protein-landing-page:${{ github.ref_name }}
            quay.io/microbiome-informatics/protein-landing-page:latest

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Push
        run: docker push quay.io/microbiome-informatics/protein-landing-page:latest