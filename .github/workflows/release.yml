name: Build and Push Docker Images

on:
  push:
    branches: [main, dev]
  release:
    types: [published]

env:
  REGISTRY: quay.io
  IMAGE_NAMESPACE: microbiome-informatics
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  docker:
    name: Build & Push Services
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'release' ||
      github.ref == 'refs/heads/dev' ||
      (github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, ' release '))

    strategy:
      matrix:
        include:
          - folder: django
            image_name: bgc_dp_web_site
            dockerfile: Dockerfile
          - folder: django
            image_name: bgc_dp_web_site_worker
            dockerfile: Dockerfile.worker
          - folder: db
            image_name: pgvector
            dockerfile: Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set Tags
        id: set_tags
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}

          if [[ "${BRANCH_NAME}" == *dev* ]]; then
            TAG=dev
          elif [[ "${BRANCH_NAME}" == *main* ]]; then
            TAG=latest
          else
            TAG=unstable
          fi

          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.folder }}
          file: ./${{ matrix.folder }}/${{ matrix.dockerfile }}
          # push: ${{ github.event_name == 'release' }}
          push: true
          tags: |
            ${{ steps.set_tags.outputs.image }}:${{ steps.set_tags.outputs.tag }}
